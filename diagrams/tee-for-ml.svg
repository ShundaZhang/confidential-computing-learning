<polyline points="600,346 600,438 520,536" fill="none" stroke="#2f9e74" stroke-width="3.2" marker-end="url(#arrowGreen)"/>
<rect x="540" y="396" width="136" height="28" rx="7" fill="#ffffff" stroke="#2f9e74" stroke-width="1.5"/>
<text x="608" y="415" text-anchor="middle" class="labelGreen">cipher weights</text>

<line x1="620" y1="583" x2="860" y2="583" stroke="#5b7fcb" stroke-width="3.2" marker-end="url(#arrowBlue)"/>
<rect x="674" y="554" width="132" height="28" rx="7" fill="#ffffff" stroke="#5b7fcb" stroke-width="1.5"/>
<text x="740" y="573" text-anchor="middle" class="labelBlue">protected I/O</text>

<polyline points="420,536 420,430 1040,430 1160,315" fill="none" stroke="#5b7fcb" stroke-width="3.2" marker-end="url(#arrowBlue)"/>
<rect x="724" y="389" width="164" height="28" rx="7" fill="#ffffff" stroke="#5b7fcb" stroke-width="1.5"/>
<text x="806" y="408" text-anchor="middle" class="labelBlue">CPU quote / digest</text>

<polyline points="1088,615 1130,615 1130,390 1160,336" fill="none" stroke="#5b7fcb" stroke-width="3.2" marker-end="url(#arrowBlue)"/>
<rect x="1078" y="430" width="128" height="28" rx="7" fill="#ffffff" stroke="#5b7fcb" stroke-width="1.5"/>
<text x="1142" y="449" text-anchor="middle" class="labelBlue">GPU evidence</text>

<polyline points="1160,330 1025,390 700,390 620,536" fill="none" stroke="#5b7fcb" stroke-width="3.2" marker-end="url(#arrowBlue)"/>
<rect x="875" y="358" width="118" height="28" rx="7" fill="#ffffff" stroke="#5b7fcb" stroke-width="1.5"/>
<text x="934" y="377" text-anchor="middle" class="labelBlue">release keys</text>

<polyline points="470,630 240,630 240,346" fill="none" stroke="#2f9e74" stroke-width="3.2" marker-end="url(#arrowGreen)"/>
<rect x="310" y="668" width="142" height="28" rx="7" fill="#ffffff" stroke="#2f9e74" stroke-width="1.5"/>
<text x="381" y="687" text-anchor="middle" class="labelGreen">encrypted result</text>

<line x1="1240" y1="548" x2="1190" y2="548" stroke="#5f6673" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowGray)"/>
<line x1="1240" y1="610" x2="1190" y2="610" stroke="#5f6673" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowGray)"/>
<rect x="1210" y="570" width="128" height="28" rx="7" fill="#ffffff" stroke="#5f6673" stroke-width="1.5"/>
<text x="1274" y="589" text-anchor="middle" class="labelGray">metadata only</text>

<text x="70" y="742" class="section">TEE primitives 在 ML 中的映射</text>
<line x1="70" y1="759" x2="1530" y2="759" stroke="#e8edf3"/>
<rect x="90" y="785" width="1460" height="126" rx="10" fill="#f8fafc" stroke="#5f6673" stroke-width="2.4"/>

<rect x="120" y="820" width="430" height="62" rx="10" fill="#eee7ff" stroke="#a796d8" stroke-width="2"/>
<text x="140" y="846" class="tag">[MEM]</text>
<text x="335" y="845" text-anchor="middle" class="boxTitle">Protected Memory</text>
<text x="335" y="873" text-anchor="middle" class="boxSub">权重、prompt、KV cache、梯度、checkpoint</text>

<rect x="585" y="820" width="430" height="62" rx="10" fill="#eee7ff" stroke="#a796d8" stroke-width="2"/>
<text x="605" y="846" class="tag">[ATT]</text>
<text x="800" y="845" text-anchor="middle" class="boxTitle">Remote Attestation</text>
<text x="800" y="873" text-anchor="middle" class="boxSub">CPU quote + GPU evidence + workload digest</text>

<rect x="1050" y="820" width="430" height="62" rx="10" fill="#eee7ff" stroke="#a796d8" stroke-width="2"/>
<text x="1070" y="846" class="tag">[I/O]</text>
<text x="1265" y="845" text-anchor="middle" class="boxTitle">Secure I/O</text>
<text x="1265" y="873" text-anchor="middle" class="boxSub">CPU-GPU、存储、网络、输出通道逐段保护</text>

<text x="70" y="952" font-size="14" fill="#5b7fcb" font-weight="800">TCB：</text>
<text x="115" y="952" class="note">CPU/GPU silicon、firmware、guest image、driver/runtime、model service、verifier/KMS policy；host/operator 不在明文边界内</text>
