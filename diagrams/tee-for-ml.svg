<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
<defs>
  <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#5b7fcb"/></marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2f9e74"/></marker>
  <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#5f6673"/></marker>
  <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#f2f4f7" stroke-width="1"/></pattern>
</defs>
<rect width="1600" height="980" fill="#ffffff"/>
<rect width="1600" height="980" fill="url(#grid)" opacity="0.55"/>
<style>
  text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;}
  .title{font-size:30px;font-weight:800;fill:#1f2933}
  .subtitle{font-size:17px;fill:#8a96a8}
  .section{font-size:18px;font-weight:800;fill:#2f3742}
  .boxTitle{font-size:20px;font-weight:800;fill:#1f2933}
  .boxTitleBlue{font-size:20px;font-weight:800;fill:#4f77d3}
  .boxSub{font-size:15px;font-weight:500;fill:#687382}
  .tag{font-size:13px;font-weight:800;fill:#8a96a8}
  .labelBlue{font-size:14px;font-weight:800;fill:#5b7fcb}
  .labelGreen{font-size:14px;font-weight:800;fill:#2f9e74}
  .labelGray{font-size:14px;font-weight:800;fill:#5f6673}
  .note{font-size:14px;font-weight:600;fill:#7c8798}
</style>

<text x="70" y="76" class="title">TEE for ML / Confidential AI 架构</text>
<text x="70" y="112" class="subtitle">CPU/GPU TEE · remote attestation · KMS key release · protected model/data path · output governance</text>

<rect x="1190" y="54" width="340" height="104" rx="10" fill="#ffffff" stroke="#d7dde7"/>
<text x="1212" y="82" font-size="15" fill="#7c8798" font-weight="800">图例</text>
<line x1="1212" y1="104" x2="1260" y2="104" stroke="#5b7fcb" stroke-width="4" marker-end="url(#arrowBlue)"/>
<text x="1274" y="109" font-size="14" fill="#4b5563">证明 / 密钥释放</text>
<line x1="1212" y1="130" x2="1260" y2="130" stroke="#2f9e74" stroke-width="4" marker-end="url(#arrowGreen)"/>
<text x="1274" y="135" font-size="14" fill="#4b5563">加密数据 / 模型 / 输出</text>
<line x1="1410" y1="104" x2="1458" y2="104" stroke="#5f6673" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrowGray)"/>
<text x="1470" y="109" font-size="14" fill="#4b5563">不可信控制</text>

<text x="70" y="190" class="section">外部参与方</text>
<line x1="70" y1="207" x2="1530" y2="207" stroke="#e8edf3"/>

<rect x="90" y="238" width="300" height="108" rx="10" fill="#dcf8e5" stroke="#93b99d" stroke-width="2"/>
<text x="108" y="264" class="tag">[DATA OWNER]</text>
<text x="240" y="285" text-anchor="middle" class="boxTitle">User / Data Owner</text>
<text x="240" y="316" text-anchor="middle" class="boxSub">prompt、RAG、训练数据</text>
<text x="240" y="338" text-anchor="middle" class="boxSub">只向合格 workload 建立会话</text>

<rect x="450" y="238" width="300" height="108" rx="10" fill="#dcf8e5" stroke="#93b99d" stroke-width="2"/>
<text x="468" y="264" class="tag">[MODEL OWNER]</text>
<text x="600" y="285" text-anchor="middle" class="boxTitle">Encrypted Weights</text>
<text x="600" y="316" text-anchor="middle" class="boxSub">模型权重、adapter、tokenizer</text>
<text x="600" y="338" text-anchor="middle" class="boxSub">密钥按证明策略释放</text>

<rect x="1160" y="238" width="330" height="108" rx="10" fill="#fff3ce" stroke="#c8a858" stroke-width="2"/>
<text x="1178" y="264" class="tag">[VERIFY]</text>
<text x="1325" y="285" text-anchor="middle" class="boxTitle">Verifier / KMS</text>
<text x="1325" y="316" text-anchor="middle" class="boxSub">校验 CPU quote + GPU evidence</text>
<text x="1325" y="338" text-anchor="middle" class="boxSub">绑定 nonce、digest、TCB、policy</text>

<text x="70" y="402" class="section">运行时边界</text>
<line x1="70" y1="419" x2="1530" y2="419" stroke="#e8edf3"/>

<rect x="260" y="450" width="560" height="238" rx="14" fill="#eef7ff" stroke="#5b7fcb" stroke-width="2.5"/>
<text x="282" y="480" class="tag">[CPU TEE / CVM]</text>
<text x="540" y="483" text-anchor="middle" class="boxTitleBlue">Confidential AI Runtime</text>
<text x="540" y="512" text-anchor="middle" class="boxSub">TDX / SEV-SNP / CCA / Secure Execution</text>

<rect x="292" y="536" width="150" height="94" rx="9" fill="#ffffff" stroke="#8aa7d8" stroke-width="1.8"/>
<text x="367" y="571" text-anchor="middle" class="boxTitle" font-size="18">Attestation</text>
<text x="367" y="598" text-anchor="middle" class="boxSub">agent / vTPM</text>
<text x="367" y="618" text-anchor="middle" class="boxSub">PCR / nonce</text>

<rect x="470" y="536" width="150" height="94" rx="9" fill="#ffffff" stroke="#8aa7d8" stroke-width="1.8"/>
<text x="545" y="571" text-anchor="middle" class="boxTitle" font-size="18">Model</text>
<text x="545" y="598" text-anchor="middle" class="boxSub">loader</text>
<text x="545" y="618" text-anchor="middle" class="boxSub">key unwrap</text>

<rect x="648" y="536" width="140" height="94" rx="9" fill="#ffffff" stroke="#8aa7d8" stroke-width="1.8"/>
<text x="718" y="571" text-anchor="middle" class="boxTitle" font-size="18">Service</text>
<text x="718" y="598" text-anchor="middle" class="boxSub">vLLM/Triton</text>
<text x="718" y="618" text-anchor="middle" class="boxSub">API guard</text>

<rect x="860" y="450" width="330" height="238" rx="14" fill="#ffffff" stroke="#5b7fcb" stroke-width="2.5"/>
<text x="882" y="480" class="tag">[GPU TEE]</text>
<text x="1025" y="483" text-anchor="middle" class="boxTitleBlue">GPU CC Mode</text>
<text x="1025" y="516" text-anchor="middle" class="boxSub">H100/H200/Blackwell 等</text>
<text x="1025" y="544" text-anchor="middle" class="boxSub">protected HBM</text>
<text x="1025" y="566" text-anchor="middle" class="boxSub">firmware / VBIOS measurement</text>
<text x="1025" y="588" text-anchor="middle" class="boxSub">KV cache、activation、gradient</text>
<rect x="900" y="615" width="250" height="42" rx="8" fill="#eef2ff" stroke="#8aa7d8"/>
<text x="1025" y="642" text-anchor="middle" class="labelBlue">GPU attestation evidence</text>

<rect x="1240" y="450" width="250" height="238" rx="14" fill="#ffe7e7" stroke="#d69a9a" stroke-width="2.2"/>
<text x="1262" y="480" class="tag">[UNTRUSTED]</text>
<text x="1365" y="483" text-anchor="middle" class="boxTitle">Host / VMM</text>
<text x="1365" y="516" text-anchor="middle" class="boxSub">cloud operator</text>
<text x="1365" y="538" text-anchor="middle" class="boxSub">host kernel / admin</text>
<text x="1365" y="560" text-anchor="middle" class="boxSub">storage / network</text>
<text x="1365" y="600" text-anchor="middle" class="boxSub">可调度和拒绝服务</text>
<text x="1365" y="622" text-anchor="middle" class="boxSub">不应看到明文</text>

<polyline points="390,292 390,430 260,540" fill="none" stroke="#2f9e74" stroke-width="3.2" marker-end="url(#arrowGreen)"/>
<rect x="230" y="382" width="136" height="28" rx="7" fill="#ffffff" stroke="#2f9e74" stroke-width="1.5"/>
