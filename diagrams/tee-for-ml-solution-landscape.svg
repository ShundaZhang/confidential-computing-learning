<rect x="1320" y="595" width="180" height="88" rx="9" fill="#ffffff" stroke="#d69a9a"/>
<text x="1410" y="625" text-anchor="middle" class="boxTitle">SGX/Keystone</text>
<text x="1410" y="654" text-anchor="middle" class="boxSub">model loader / signer</text>

<text x="1410" y="735" text-anchor="middle" class="note">强项：边界窄、TCB 小</text>
<text x="1410" y="760" text-anchor="middle" class="note">短板：不覆盖完整 GPU 栈</text>

<rect x="70" y="835" width="1460" height="92" rx="10" fill="#f8fafc" stroke="#5f6673" stroke-width="2.3"/>
<text x="96" y="865" class="tag">选型要点</text>
<text x="96" y="897" class="note">固定服务看透明发布和不可定向化；云 GPU 看 CPU quote + GPU evidence + 镜像 digest；企业控制面看 KMS/策略审计；K8s 方案看 manifest/PodVM/Trustee；sidecar 看父实例协议和重放保护。</text>
