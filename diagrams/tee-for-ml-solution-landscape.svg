<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
<defs>
  <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#5b7fcb"/></marker>
  <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#f2f4f7" stroke-width="1"/></pattern>
</defs>
<rect width="1600" height="980" fill="#ffffff"/>
<rect width="1600" height="980" fill="url(#grid)" opacity="0.55"/>
<style>
  text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;}
  .title{font-size:30px;font-weight:800;fill:#1f2933}
  .subtitle{font-size:17px;fill:#8a96a8}
  .laneTitle{font-size:20px;font-weight:800;fill:#1f2933}
  .boxTitle{font-size:19px;font-weight:800;fill:#1f2933}
  .boxSub{font-size:14px;font-weight:500;fill:#687382}
  .tag{font-size:13px;font-weight:800;fill:#8a96a8}
  .note{font-size:14px;font-weight:600;fill:#7c8798}
</style>

<text x="70" y="76" class="title">TEE for ML 产品/方案形态图</text>
<text x="70" y="112" class="subtitle">从固定 AI 服务到云上 confidential GPU、企业控制面、Kubernetes service mesh 和小 TCB sidecar</text>

<rect x="70" y="155" width="1460" height="92" rx="10" fill="#f8fafc" stroke="#d7dde7"/>
<text x="95" y="184" class="tag">共同安全模式</text>
<text x="95" y="216" class="laneTitle">测量 workload 与硬件 TCB → verifier/KMS 校验 CPU/GPU/容器/manifest evidence → 释放数据密钥或模型密钥 → 在 TEE 边界内运行 AI 负载</text>

<line x1="800" y1="247" x2="800" y2="300" stroke="#5b7fcb" stroke-width="3" marker-end="url(#arrowBlue)"/>

<rect x="70" y="305" width="275" height="482" rx="14" fill="#eef7ff" stroke="#8aa7d8" stroke-width="2.2"/>
<text x="96" y="336" class="tag">[FIXED AI SERVICE]</text>
<text x="207.5" y="366" text-anchor="middle" class="laneTitle">固定 AI 产品</text>
<text x="207.5" y="396" text-anchor="middle" class="boxSub">服务商控制 workload</text>
<text x="207.5" y="418" text-anchor="middle" class="boxSub">客户端验证服务版本</text>

<rect x="100" y="455" width="215" height="88" rx="9" fill="#ffffff" stroke="#8aa7d8"/>
<text x="207.5" y="485" text-anchor="middle" class="boxTitle">Apple PCC</text>
<text x="207.5" y="514" text-anchor="middle" class="boxSub">透明日志 / 固定 PCC build</text>

