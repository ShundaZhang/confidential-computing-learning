<text x="207.5" y="735" text-anchor="middle" class="note">强项：服务端闭环强</text>
<text x="207.5" y="760" text-anchor="middle" class="note">短板：客户自定义少</text>

<rect x="375" y="305" width="275" height="482" rx="14" fill="#dcf8e5" stroke="#93b99d" stroke-width="2.2"/>
