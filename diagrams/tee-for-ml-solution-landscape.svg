<rect x="1015" y="455" width="215" height="88" rx="9" fill="#ffffff" stroke="#a796d8"/>
<text x="1122.5" y="485" text-anchor="middle" class="boxTitle">Edgeless</text>
<text x="1122.5" y="514" text-anchor="middle" class="boxSub">Marblerun / Contrast</text>

<rect x="1015" y="570" width="215" height="112" rx="9" fill="#ffffff" stroke="#a796d8"/>
<text x="1122.5" y="600" text-anchor="middle" class="boxTitle">Confidential Containers</text>
<text x="1122.5" y="629" text-anchor="middle" class="boxSub">Kata PodVM + Trustee</text>
